<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giới Thiệu - VFRRRR</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white flex flex-col min-h-screen font-sans">

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 shadow-sm border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black text-gray-900 tracking-tighter italic">VF<span class="text-orange-500">RRRR</span></div>
            <div class="flex gap-8 font-bold text-gray-600 text-sm uppercase">
                <a href="index.html" class="hover:text-orange-500 transition">Trang chủ</a>
                <a href="about.html" class="text-orange-500 border-b-2 border-orange-500">Giới thiệu</a>
                <a href="contact.html" class="hover:text-orange-500 transition">Liên hệ</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow py-16 px-6">
        <div class="max-w-4xl mx-auto">
            <div class="bg-gray-50 p-10 md:p-16 rounded-[40px] border border-gray-100 shadow-sm">
                <span class="text-orange-500 font-bold tracking-widest uppercase text-xs">Về chúng tôi</span>
                <h1 id="title" class="text-4xl md:text-5xl font-black text-gray-900 mt-4 mb-8 uppercase italic leading-tight">Đang tải...</h1>
                <div id="body" class="text-lg md:text-xl text-gray-600 leading-relaxed font-light italic space-y-6">
                    </div>
            </div>
        </div>
    </main>

    <footer class="bg-gray-900 text-gray-400 py-12 px-6 mt-10">
        <div class="max-w-7xl mx-auto text-center border-b border-gray-800 pb-8">
            <div class="text-xl font-bold text-white mb-2 italic">VFRRRR</div>
            <p class="text-xs uppercase tracking-[0.3em]">Giải pháp Marketing thế hệ mới</p>
        </div>
        <div class="max-w-7xl mx-auto mt-8 text-center text-[10px] uppercase tracking-widest">
            © 2026 VFRRRR. All rights reserved.
        </div>
    </footer>

    <script type="module">
        import { db, doc, getDoc } from './db.js';
        async function load() {
            const snap = await getDoc(doc(db, "web_content", "about"));
            if(snap.exists()){
                document.getElementById('title').innerText = snap.data().title;
                document.getElementById('body').innerHTML = snap.data().body.replace(/\n/g, '<br>');
            }
        }
        load();
    </script>
</body>
</html>
