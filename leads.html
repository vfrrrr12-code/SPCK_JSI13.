<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads Center - vfrrrr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif !important; }
        body { background-color: #f8fafc; color: #0f172a; }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
        .bento-card { 
            border-radius: 40px; 
            background: white; 
            border: 1px solid #f1f5f9; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .bento-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
    <script>
        if (sessionStorage.getItem("isVfrrrrAdmin") !== "true") {
            window.location.href = "login.html";
        }
    </script>
</head>
<body class="antialiased flex flex-col min-h-screen">

    <nav class="glass-nav sticky top-0 z-50 text-white">
        <div class="max-w-7xl mx-auto px-8 py-5 flex justify-between items-center">
            <div class="text-2xl font-black italic uppercase tracking-tighter">
                VF<span class="text-orange-500">RRRR</span> <span class="text-[10px] opacity-40 ml-2 font-extrabold tracking-widest uppercase">Leads Center</span>
            </div>
            <div class="flex items-center gap-6">
                <a href="admin.html" class="text-[10px] font-black uppercase tracking-widest hover:text-orange-500 transition">Quay lại Admin</a>
                <button onclick="sessionStorage.clear(); window.location.href='login.html'" class="bg-orange-500 text-white px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest active:scale-95 transition">Thoát</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow py-16 px-6">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-end mb-12 gap-6">
                <div>
                    <h1 class="text-5xl md:text-6xl font-black text-slate-900 uppercase italic tracking-tighter leading-none">
                        Customer <span class="text-orange-500">Leads</span>
                    </h1>
                    <p class="text-slate-400 italic mt-3 font-medium border-l-4 border-orange-500 pl-6">Dữ liệu khách hàng cập nhật thời gian thực.</p>
                </div>
                <div id="count-box" class="bg-white border border-slate-200 text-slate-900 px-8 py-4 rounded-3xl font-black text-xs shadow-sm uppercase tracking-[0.2em] italic">
                    0 Khách hàng
                </div>
            </div>

            <div id="lead-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <div class="col-span-full py-20 text-center text-slate-300 font-bold italic uppercase tracking-widest">
                    Đang đồng bộ dữ liệu...
                </div>
            </div>
        </div>
    </main>

    <footer class="py-12 border-t border-slate-100 bg-white">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <div class="text-[10px] text-slate-300 font-black uppercase tracking-[0.5em] italic">
                © 2026 vfrrrr studio • Innovation Center
            </div>
        </div>
    </footer>

    <script type="module">
        import { db, collection, onSnapshot } from './db.js';

        onSnapshot(collection(db, "customer_leads"), (snapshot) => {
            const list = document.getElementById('lead-list');
            const countBox = document.getElementById('count-box');
            
            if (snapshot.empty) {
                list.innerHTML = `
                    <div class="col-span-full py-32 text-center bento-card border-dashed border-2">
                        <p class="text-slate-300 font-black uppercase tracking-widest text-xs">Hiện tại chưa có khách hàng đăng ký</p>
                    </div>`;
                countBox.innerText = "0 KHÁCH HÀNG";
                return;
            }

            countBox.innerText = `${snapshot.size} KHÁCH HÀNG`;

            let html = '';
            const docs = snapshot.docs.map(d => ({id: d.id, ...d.data()}));
            docs.sort((a, b) => b.id.localeCompare(a.id)); 

            docs.forEach(lead => {
                html += `
                    <div class="bento-card p-10 shadow-sm hover:shadow-xl group relative overflow-hidden">
                        <div class="absolute -top-6 -right-6 w-24 h-24 bg-slate-50 rounded-full group-hover:bg-orange-50 transition-colors"></div>
                        
                        <div class="relative z-10">
                            <div class="flex justify-between items-start mb-10">
                                <div class="w-14 h-14 bg-slate-900 rounded-2xl flex items-center justify-center text-white shadow-lg group-hover:bg-orange-500 transition-colors duration-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                    </svg>
                                </div>
                                <div class="text-right">
                                    <p class="text-[9px] font-black uppercase text-slate-300 tracking-widest mb-1">Time</p>
                                    <p class="text-[10px] font-bold text-slate-500 italic bg-slate-50 px-3 py-1 rounded-full border border-slate-100">${lead.time || 'N/A'}</p>
                                </div>
                            </div>

                            <div class="mb-10">
                                <h3 class="text-3xl font-black italic uppercase tracking-tighter text-slate-900 mb-2">${lead.name}</h3>
                                <p class="text-orange-500 font-black tracking-[0.2em] text-[11px] uppercase">${lead.phone}</p>
                            </div>

                            <div class="grid grid-cols-2 gap-4 pt-8 border-t border-slate-50">
                                <a href="tel:${lead.phone}" class="flex items-center justify-center bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-[9px] hover:bg-orange-500 transition-all shadow-md active:scale-95">
                                    Gọi Điện
                                </a>
                                <a href="https://zalo.me/${lead.phone}" target="_blank" class="flex items-center justify-center bg-blue-50 text-blue-600 py-4 rounded-2xl font-black uppercase tracking-widest text-[9px] hover:bg-blue-600 hover:text-white transition-all">
                                    Zalo Chat
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            });
            list.innerHTML = html;
        });
    </script>
</body>
</html>
