<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh Sách Đơn</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow p-6">
        <h1 class="text-2xl font-bold mb-6">📩 Khách Hàng Mới</h1>
        <div id="list" class="space-y-3">Đang tải...</div>
    </div>
    <script type="module">
        import { db, collection, onSnapshot } from './db.js';
        onSnapshot(collection(db, "customer_leads"), (snap) => {
            let html = '';
            snap.forEach(d => {
                const lead = d.data();
                html += `<div class="p-4 border-b flex justify-between">
                    <div><b>${lead.name}</b> - <span class="text-orange-600 font-bold">${lead.phone}</span></div>
                    <div class="text-gray-400 text-sm">${lead.time}</div>
                </div>`;
            });
            document.getElementById('list').innerHTML = html || "Chưa có đơn hàng nào.";
        });
    </script>
</body>
</html>
