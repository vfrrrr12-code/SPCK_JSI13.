<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Chủ - VFRRRR</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white flex flex-col min-h-screen font-sans">

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 shadow-sm border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black text-gray-900 tracking-tighter italic">VF<span class="text-orange-500">RRRR</span></div>
            <div class="flex gap-8 font-bold text-gray-600 text-sm uppercase">
                <a href="index.html" class="text-orange-500">Trang chủ</a>
                <a href="about.html" class="hover:text-orange-500 transition">Giới thiệu</a>
                <a href="contact.html" class="hover:text-orange-500 transition">Liên hệ</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow">
        <header class="relative h-[600px] flex items-center justify-center text-white overflow-hidden">
            <img id="banner-img" src="" class="absolute inset-0 w-full h-full object-cover z-0">
            <div class="absolute inset-0 bg-black/60 z-10"></div>
            <div class="relative z-20 text-center px-6 max-w-4xl">
                <h1 id="title" class="text-5xl md:text-7xl font-black mb-6 uppercase tracking-tighter italic">Loading...</h1>
                <p id="body" class="text-xl text-gray-200 mb-10 leading-relaxed max-w-2xl mx-auto font-light italic"></p>
                <a href="contact.html" class="bg-orange-500 hover:bg-orange-600 text-white px-10 py-4 rounded-full font-black text-lg shadow-xl transition transform hover:scale-105 inline-block uppercase">Tư vấn ngay</a>
            </div>
        </header>
    </main>

    <footer class="bg-gray-900 text-gray-400 py-12 px-6 mt-10 relative">
    <div class="max-w-7xl mx-auto text-center border-b border-gray-800 pb-8">
        <div class="text-xl font-bold text-white mb-2 italic uppercase tracking-widest">vfrrrr</div>
        <p class="text-xs uppercase tracking-[0.3em] text-orange-500/80 font-bold italic">Giải pháp Marketing đột phá</p>
    </div>
    
    <div class="max-w-7xl mx-auto mt-8 flex justify-between items-center text-[10px] uppercase tracking-widest px-4">
        <span>© 2026 vfrrrr. All rights reserved.</span>
        
        <a href="login.html" class="text-gray-700 hover:text-orange-500 transition duration-300 flex items-center gap-1 group">
            <span class="opacity-0 group-hover:opacity-100 transition-opacity">QUẢN TRỊ</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
        </a>
    </div>
</footer>

    <script type="module">
        import { db, doc, getDoc } from './db.js';
        async function load() {
            const snap = await getDoc(doc(db, "web_content", "home"));
            if(snap.exists()){
                const data = snap.data();
                document.getElementById('title').innerText = data.title;
                document.getElementById('body').innerText = data.body;
                document.getElementById('banner-img').src = data.bannerUrl || "https://images.unsplash.com/photo-1497215728101-856f4ea42174";
            }
        }
        load();
    </script>
</body>
</html>
