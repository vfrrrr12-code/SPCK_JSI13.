<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - vfrrrr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>if(sessionStorage.getItem("isVfrrrrAdmin") !== "true") window.location.href="login.html";</script>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
            <div>
                <h1 class="text-3xl font-black italic text-white uppercase tracking-tighter">VFRRRR <span class="text-orange-500">CMS</span></h1>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1">Hệ thống quản trị nội dung v2.0</p>
            </div>
            <div class="flex gap-3">
                <a href="leads.html" class="bg-white/10 hover:bg-white text-white hover:text-slate-950 px-6 py-3 rounded-2xl text-xs font-black uppercase transition-all">📦 Đơn hàng</a>
                <button onclick="sessionStorage.clear(); location.reload();" class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white border border-red-500/20 px-6 py-3 rounded-2xl text-xs font-black uppercase transition-all">Thoát</button>
            </div>
        </header>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="space-y-4">
                <label class="text-xs font-black uppercase text-slate-500 ml-4">Chọn trang chỉnh sửa</label>
                <select id="slug" class="w-full p-5 rounded-[24px] bg-slate-800 border border-slate-700 outline-none font-bold text-white focus:ring-2 focus:ring-orange-500 transition-all appearance-none cursor-pointer">
                    <option value="home">🏠 TRANG CHỦ</option>
                    <option value="about">ℹ️ GIỚI THIỆU</option>
                    <option value="contact">📞 LIÊN HỆ</option>
                </select>
            </div>

            <div class="lg:col-span-2 space-y-6 bg-slate-800/50 p-8 rounded-[40px] border border-white/5">
                <div>
                    <label class="block text-xs font-black uppercase text-slate-500 mb-2 ml-2">Tiêu đề chính</label>
                    <input id="t" type="text" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 focus:border-orange-500 outline-none transition-all text-white font-bold">
                </div>
                <div>
                    <label class="block text-xs font-black uppercase text-slate-500 mb-2 ml-2">Mô tả ngắn</label>
                    <textarea id="b" rows="3" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 focus:border-orange-500 outline-none transition-all text-white"></textarea>
                </div>
                <div>
                    <label class="block text-xs font-black uppercase text-slate-500 mb-2 ml-2">Nội dung chi tiết</label>
                    <textarea id="sb" rows="6" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 focus:border-orange-500 outline-none transition-all text-white"></textarea>
                </div>
                <div>
                    <label class="block text-xs font-black uppercase text-slate-500 mb-2 ml-2">URL Ảnh Banner</label>
                    <input id="u" type="text" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 focus:border-orange-500 outline-none transition-all text-white text-sm">
                </div>

                <button id="btnSave" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-orange-900/20 transition-all transform active:scale-[0.98] uppercase tracking-widest">
                    Cập nhật nội dung
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, doc, getDoc, setDoc } from './db.js';
        const fields = { slug: 'slug', t: 't', b: 'b', sb: 'sb', u: 'u', btn: 'btnSave' };
        const getEl = id => document.getElementById(fields[id]);

        async function loadContent() {
            const snap = await getDoc(doc(db, "web_content", getEl('slug').value));
            if(snap.exists()){
                const d = snap.data();
                getEl('t').value = d.title || "";
                getEl('b').value = d.body || "";
                getEl('sb').value = d.subBody || "";
                getEl('u').value = d.bannerUrl || "";
            }
        }

        getEl('slug').onchange = loadContent;
        window.onload = loadContent;

        getEl('btn').onclick = async () => {
            getEl('btn').innerText = "ĐANG LƯU...";
            try {
                await setDoc(doc(db, "web_content", getEl('slug').value), {
                    title: getEl('t').value,
                    body: getEl('b').value,
                    subBody: getEl('sb').value,
                    bannerUrl: getEl('u').value
                });
                alert("Đã lưu thành công!");
            } catch (e) { alert("Lỗi: " + e.message); }
            getEl('btn').innerText = "CẬP NHẬT NỘI DUNG";
        };
    </script>
</body>
</html>
