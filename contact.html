<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | vfrrrr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <style>* { font-family: 'Plus Jakarta Sans', sans-serif !important; } body { background-color: #f8fafc; }</style>
</head>
<body class="antialiased flex flex-col min-h-screen">
    <nav class="fixed top-6 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-3xl">
        <div class="bg-white/80 backdrop-blur-xl border border-slate-200 rounded-full px-8 py-4 flex justify-between items-center shadow-lg">
            <div class="text-2xl font-black italic tracking-tighter uppercase">VF<span class="text-orange-500">RRRR</span></div>
            <div class="flex gap-8 text-[10px] uppercase font-extrabold tracking-widest text-slate-400">
                <a href="index.html" class="hover:text-orange-500 transition">Home</a>
                <a href="about.html" class="hover:text-orange-500 transition">About</a>
                <a href="contact.html" class="text-orange-500">Contact</a>
            </div>
        </div>
    </nav>

    <header class="relative h-[33vh] flex items-center justify-center overflow-hidden bg-slate-900">
        <img id="banner-img" src="" class="absolute inset-0 w-full h-full object-cover opacity-40">
        <h1 id="title" class="relative z-10 text-white text-5xl md:text-7xl font-black italic uppercase tracking-tighter">Contact</h1>
    </header>

    <main class="py-16 px-6 max-w-6xl mx-auto grid md:grid-cols-2 gap-10 items-start">
        <div class="space-y-6">
            <p id="body" class="text-xl text-slate-500 italic font-medium leading-relaxed border-l-4 border-orange-500 pl-6"></p>
            <div class="font-extrabold italic text-slate-800 text-sm tracking-widest">HELLO@VFRRRR.COM</div>
        </div>
        <div class="bg-white p-10 rounded-[40px] shadow-2xl shadow-slate-200 border border-white">
            <form id="leadForm" class="space-y-4">
                <input type="text" id="custName" placeholder="Tên khách hàng" required class="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 font-bold">
                <input type="tel" id="custPhone" placeholder="Số điện thoại" required class="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 font-bold">
                <button type="submit" id="btnSend" class="w-full bg-slate-900 text-white font-extrabold py-5 rounded-2xl uppercase text-[10px] tracking-widest hover:bg-orange-500 transition shadow-xl">Gửi thông tin</button>
            </form>
            <p id="msg" class="mt-6 text-center text-green-600 font-bold italic hidden animate-pulse">✨ Cảm ơn bạn! Chúng tôi sẽ gọi lại ngay.</p>
        </div>
    </main>

    <script type="module">
        import { db, doc, getDoc, setDoc } from './db.js';
        async function load() {
            const snap = await getDoc(doc(db, 'web_content', 'contact'));
            if(snap.exists()){
                const d = snap.data();
                document.getElementById('title').innerText = d.title;
                document.getElementById('body').innerText = d.body;
                if(d.bannerUrl) document.getElementById('banner-img').src = d.bannerUrl;
            }
        }
        load();
        
        document.getElementById('leadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSend');
            btn.innerText = "ĐANG GỬI...";
            try {
                await setDoc(doc(db, 'customer_leads', 'id_' + Date.now()), {
                    name: document.getElementById('custName').value,
                    phone: document.getElementById('custPhone').value,
                    time: new Date().toLocaleString()
                });
                document.getElementById('msg').classList.remove('hidden');
                document.getElementById('leadForm').reset();
            } catch (err) { alert(err.message); }
            btn.innerText = "GỬI THÔNG TIN";
        };
    </script>
</body>
</html>
