<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Liên Hệ - VFRRRR</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white flex flex-col min-h-screen font-sans">

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 shadow-sm border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black text-gray-900 tracking-tighter italic">VF<span class="text-orange-500">RRRR</span></div>
            <div class="flex gap-8 font-bold text-gray-600 text-sm uppercase">
                <a href="index.html" class="hover:text-orange-500 transition">Trang chủ</a>
                <a href="about.html" class="hover:text-orange-500 transition">Giới thiệu</a>
                <a href="contact.html" class="text-orange-500 border-b-2 border-orange-500">Liên hệ</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow py-16 px-6">
        <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-12 items-center">
            
            <div class="space-y-6">
                <h1 id="title" class="text-5xl font-black text-gray-900 uppercase italic">Đang tải...</h1>
                <p id="body" class="text-xl text-gray-500 italic font-light leading-relaxed"></p>
                <div class="pt-6 space-y-4">
                    <div class="flex items-center gap-4 text-gray-700 font-bold">
                        <span class="bg-orange-100 p-3 rounded-full text-orange-600">📞</span> 0123 456 789
                    </div>
                    <div class="flex items-center gap-4 text-gray-700 font-bold">
                        <span class="bg-orange-100 p-3 rounded-full text-orange-600">✉️</span> contact@mybrand.com
                    </div>
                </div>
            </div>

            <div class="bg-white p-8 md:p-12 rounded-[40px] shadow-2xl border border-gray-100 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-24 h-24 bg-orange-500/10 rounded-bl-full"></div>
                <h2 class="text-2xl font-black mb-6 uppercase italic text-gray-800">Gửi lời nhắn</h2>
                
                <form id="leadForm" class="space-y-4">
                    <input type="text" id="custName" placeholder="Họ và tên của bạn" required 
                           class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition">
                    <input type="tel" id="custPhone" placeholder="Số điện thoại" required 
                           class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition">
                    <button type="submit" id="btnSend" 
                            class="w-full bg-orange-500 hover:bg-orange-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-orange-200 transition transform active:scale-95 uppercase tracking-widest">
                        Gửi ngay
                    </button>
                </form>
                <p id="msg" class="mt-4 text-center text-green-600 font-bold hidden">✨ Chúng tôi đã nhận được thông tin!</p>
            </div>

        </div>
    </main>

    <footer class="bg-gray-900 text-gray-400 py-12 px-6 mt-10">
        <div class="max-w-7xl mx-auto text-center border-b border-gray-800 pb-8">
            <div class="text-xl font-bold text-white mb-2 italic">VFRRRR</div>
            <p class="text-xs uppercase tracking-[0.3em]">Giải pháp Marketing thế hệ mới</p>
        </div>
        <div class="max-w-7xl mx-auto mt-8 text-center text-[10px] uppercase tracking-widest">
            © 2026 VFRRRR. All rights reserved.
        </div>
    </footer>

    <script type="module">
        import { db, doc, getDoc, setDoc } from './db.js';
        
        // 1. Load nội dung text
        async function load() {
            const snap = await getDoc(doc(db, "web_content", "contact"));
            if(snap.exists()){
                document.getElementById('title').innerText = snap.data().title;
                document.getElementById('body').innerText = snap.data().body;
            }
        }
        load();

        // 2. Gửi dữ liệu khách hàng
        document.getElementById('leadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSend');
            btn.innerText = "Đang gửi...";
            btn.disabled = true;

            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;

            try {
                await setDoc(doc(db, "customer_leads", "id_" + Date.now()), {
                    name, phone, time: new Date().toLocaleString()
                });
                document.getElementById('msg').classList.remove('hidden');
                document.getElementById('leadForm').reset();
            } catch (err) {
                alert("Lỗi: " + err.message);
            } finally {
                btn.innerText = "Gửi ngay";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
